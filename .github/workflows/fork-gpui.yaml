          }

          rename_original_root_readmes() {
            python3 - "$OUT_DIR" "$UPSTREAM_REPO" "$UPSTREAM_BRANCH" <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path(sys.argv[1])
          repo = sys.argv[2]
          ref = sys.argv[3]

          pattern = re.compile(r"^README(?:\..+)?\.md$", re.IGNORECASE)

          def renamed(name: str) -> str:
              if name.lower() == "readme.md":
                  return "README-zed.md"
              return re.sub(r"^README", "README-zed", name, count=1, flags=re.IGNORECASE)

          def prepend_source_link(path: Path) -> None:
              header = f"> Original source: [{repo} @ {ref}](https://github.com/{repo}/tree/{ref})\n\n"
              try:
                  body = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  body = path.read_text(errors="replace")
              if not body.startswith(header):
                  path.write_text(header + body, encoding="utf-8")

          renamed_any = False
          for src in sorted(root.iterdir()):
              if not src.is_file() or pattern.match(src.name) is None:
                  continue
              if src.name.startswith("README-zed"):
                  prepend_source_link(src)
                  continue
              dst = root / renamed(src.name)
              print(f"Renaming original root {src.name} to {dst.name}")
              if dst.exists():
                  dst.unlink()
              src.rename(dst)
              prepend_source_link(dst)
              renamed_any = True

          if not renamed_any:
              print("No root README.md or README.*.md found to rename")
          PY
          }

          generate_files_by_date_markdown() {
            local date_snapshot_path="$1"
            local output_path="$OUT_DIR/FILES-BY-DATE-ZED.md"

            echo "Generating: FILES-BY-DATE-ZED.md"

            cd "$OUT_DIR"

            python3 - "$OUT_DIR" "$output_path" "$date_snapshot_path" <<'PY'
          from collections import defaultdict
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo
          import sys

          output_root = Path(sys.argv[1]).resolve()
          output_path = Path(sys.argv[2]).resolve()
          date_snapshot_path = Path(sys.argv[3]).resolve()
          denver = ZoneInfo("America/Denver")

          source_dates = {}
          if date_snapshot_path.exists():
              for line in date_snapshot_path.read_text(encoding="utf-8").splitlines():
                  if not line.strip():
                      continue
                  try:
                      rel, date = line.split("	", 1)
                  except ValueError:
                      continue
                  source_dates[rel] = date

          # Hard-coded exclusions for FILES-BY-DATE-ZED.md.
          # These files are generated, rewritten, renamed, or intentionally omitted
          # from the date-grouped Zed source-file manifest.
          manifest_excludes = {
              "Cargo.toml",
              "Cargo.lock",
              "README.md",
              "README-zed.md",
              "crates/gpui_facade/Cargo.toml",
              "crates/gpui_facade/README.md",
              "crates/gpui_facade/src/lib.rs",
          }

          def source_date(path: Path, rel: str) -> str:
              # Prefer the upstream Git commit date captured before workflow rewrites.
              # Filesystem mtimes from git checkout are normally checkout-time, so they
              # cannot be used as historical source-file dates.
              snapshot_date = source_dates.get(rel)
              if snapshot_date:
                  return snapshot_date

              # Fallback for generated or untracked files that are not excluded above.
              return datetime.fromtimestamp(path.stat().st_mtime, denver).date().isoformat()

          groups = defaultdict(list)

          for path in output_root.rglob("*"):
              if not path.is_file():
                  continue

              rel = path.relative_to(output_root).as_posix()

              if rel == output_path.name:
                  continue
              if rel.startswith(".git/"):
                  continue
              if rel in manifest_excludes:
                  continue

              groups[source_date(path, rel)].append(rel)

          lines = [
              "# Files by date changed in Zed",
              "",
              "Latest dates are listed first.",
              "",
              "Dates are grouped using the Denver, Colorado timezone (America/Denver).",
              "",
              "Dates come from the latest upstream Git commit that changed each tracked file, grouped in the Denver timezone.",
              "Generated or rewritten files excluded from this manifest are intentionally omitted.",
              "",
          ]

          for date in sorted(groups.keys(), reverse=True):
              lines.append(f"## {date}")
              lines.append("")

              for rel in sorted(groups[date]):
                  lines.append(f"- `{rel}`")

              lines.append("")

          output_path.write_text("\n".join(lines).rstrip() + "\n", encoding="utf-8")
          PY
          }

          amend_root_cargo_toml_for_workspace() {
            echo "Amending root Cargo.toml workspace members/default-members/exclude"

            cd "$OUT_DIR"

            python3 - <<'PY'
          from pathlib import Path
          import fnmatch
          import os
          import re

          ROOT_CARGO = Path("Cargo.toml")

          if not ROOT_CARGO.exists():
              raise SystemExit("Missing root Cargo.toml")

          text = ROOT_CARGO.read_text()

          generated_member = "crates/gpui_facade"

          WORKSPACE_PREFIXES = (
              "crates/",
              "extensions/",
              "tooling/",
          )

          def clean_pattern(raw: str) -> str | None:
              pattern = raw.strip().rstrip("\r")

              if not pattern:
                  return None
              if pattern.startswith("#"):
                  return None
              if pattern.startswith("!"):
                  return None

              return pattern.lstrip("./")

          exclude_patterns = []

          for raw in os.environ.get("EXCLUDE_PATTERNS", "").splitlines():
              pattern = clean_pattern(raw)
              if pattern:
                  exclude_patterns.append(pattern)

          def matches_exclude_pattern(workspace_path: str, pattern: str) -> bool:
              value = workspace_path.strip().rstrip("/")
              pat = pattern.strip().rstrip("\r").lstrip("./")

              if not pat:
                  return False

              if pat.endswith("/"):
                  base = pat.rstrip("/")
                  return value == base or value.startswith(base + "/")

              if pat.endswith("/**"):
                  base = pat[:-3].rstrip("/")
                  return value == base or value.startswith(base + "/")

              if pat.endswith("/*"):
                  base = pat[:-2].rstrip("/")
                  if not value.startswith(base + "/"):
                      return False
                  rest = value[len(base) + 1:]
                  return "/" not in rest

              if fnmatch.fnmatch(value, pat):
                  return True

              if fnmatch.fnmatch(value + "/", pat):
                  return True

              return False

          def is_workspace_path(value: str) -> bool:
              return value.startswith(WORKSPACE_PREFIXES)

          workspace_match = re.search(r"(?ms)^\[workspace\]\s*(.*?)(?=^\[|\Z)", text)
          if not workspace_match:
              raise SystemExit("Could not find [workspace] table in root Cargo.toml")

          ws_start, ws_end = workspace_match.span()
          workspace_block = text[ws_start:ws_end]

          def read_array(block: str, key: str) -> list[str]:
              # Handles both:
              #   key = ["a", "b"]
              # and:
              #   key = [
              #       "a",
              #       "b",
              #   ]
              pattern = re.compile(
                  rf"(?ms)^(\s*{re.escape(key)}\s*=\s*)\[(.*?)\]"
              )

              match = pattern.search(block)
              if not match:
                  return []

              body = match.group(2)

              values = []
              for string_match in re.finditer(r'"([^"]+)"', body):
                  values.append(string_match.group(1))

              return values

          def unique_preserve_order(values: list[str]) -> list[str]:
              seen = set()
              result = []

              for value in values:
                  if value in seen:
                      continue
                  seen.add(value)
                  result.append(value)

              return result

          def write_array(block: str, key: str, values: list[str]) -> str:
              values = unique_preserve_order(values)

              replacement = f"{key} = [\n"
              for value in values:
                  replacement += f'    "{value}",\n'
              replacement += "]"

              pattern = re.compile(
                  rf"(?ms)^(\s*{re.escape(key)}\s*=\s*)\[(.*?)\]"
              )

              match = pattern.search(block)

              if match:
                  return block[:match.start()] + replacement + block[match.end():]

              # Insert missing arrays near the top of [workspace].
              header_match = re.search(r"(?m)^\[workspace\]\s*$", block)
              if not header_match:
                  raise SystemExit("Could not find [workspace] header while writing array")

              insert_at = header_match.end()
              return block[:insert_at] + "\n" + replacement + "\n" + block[insert_at:]

          def cargo_manifest_exists(workspace_path: str) -> bool:
              if "*" in workspace_path:
                  # Cargo supports glob members. Do not try to check a literal path.
                  return True

              return (Path(workspace_path) / "Cargo.toml").exists()

          members = read_array(workspace_block, "members")
          default_members = read_array(workspace_block, "default-members")
          existing_exclude = read_array(workspace_block, "exclude")

          all_workspace_paths = unique_preserve_order(members + default_members)

          excluded_by_pattern = set()

          for workspace_path in all_workspace_paths:
              if workspace_path == generated_member:
                  continue

              if not is_workspace_path(workspace_path):
                  continue

              for pattern in exclude_patterns:
                  if matches_exclude_pattern(workspace_path, pattern):
                      excluded_by_pattern.add(workspace_path)
                      break

          missing_members = set()

          for workspace_path in members:
              if workspace_path == generated_member:
                  continue

              if not is_workspace_path(workspace_path):
                  continue

              if not cargo_manifest_exists(workspace_path):
                  missing_members.add(workspace_path)

          remove_from_workspace = excluded_by_pattern | missing_members

          print("Workspace paths excluded by EXCLUDE_PATTERNS:")
          if excluded_by_pattern:
              for item in sorted(excluded_by_pattern):
                  print(f"  - {item}")
          else:
              print("  - none")

          print("Workspace members removed because Cargo.toml is missing:")
          if missing_members:
              for item in sorted(missing_members):
                  print(f"  - {item}")
          else:
              print("  - none")

          new_members = []

          for item in members:
              if item in remove_from_workspace:
                  print(f"Removing {item!r} from [workspace].members")
                  continue
              new_members.append(item)

          if generated_member not in new_members:
              print(f"Adding {generated_member!r} to [workspace].members")
              new_members.append(generated_member)

          member_set = set(new_members)

          new_default_members = []

          for item in default_members:
              if item in remove_from_workspace:
                  print(f"Removing {item!r} from [workspace].default-members because it is excluded/missing")
                  continue

              if item not in member_set:
                  print(f"Removing {item!r} from [workspace].default-members because it is not in members")
                  continue

              new_default_members.append(item)

          if not new_default_members and generated_member in member_set:
              # The generated branch has a virtual workspace. Cargo uses
              # default-members for root package commands when present; keeping
              # an explicit empty array makes root `cargo check` unexpectedly
              # select nothing. Fall back to the facade package instead of
              # hard-coding upstream Zed members that may change.
              new_default_members.append(generated_member)

          new_exclude = unique_preserve_order(
              existing_exclude + sorted(remove_from_workspace)
          )

          # Do not exclude the generated crate.
          new_exclude = [item for item in new_exclude if item != generated_member]

          workspace_block = write_array(workspace_block, "members", new_members)
          workspace_block = write_array(workspace_block, "default-members", new_default_members)
          workspace_block = write_array(workspace_block, "exclude", new_exclude)

          text = text[:ws_start] + workspace_block + text[ws_end:]
          ROOT_CARGO.write_text(text)

          print("Final [workspace].members contains crates/gpui_facade:", generated_member in new_members)
          print("Final [workspace].default-members:")
          for item in new_default_members:
              print(f"  - {item}")

          print("Root Cargo.toml workspace amendment completed")
          PY
          }

          validate_gpui_facade_features() {
            echo "Validating gpui_facade feature mirror and feature references"

            cd "$OUT_DIR"

            python3 - "${GITHUB_STEP_SUMMARY:-}" <<'PY'
          from pathlib import Path
          import json
          import re
          import sys
          import tomllib

          summary_arg = sys.argv[1] if len(sys.argv) > 1 else ""
          summary_path = Path(summary_arg) if summary_arg else None
          root = Path.cwd().resolve()
          root_manifest = root / "Cargo.toml"
          gpui_manifest = root / "crates/gpui/Cargo.toml"
          facade_manifest = root / "crates/gpui_facade/Cargo.toml"

          errors = []
          warnings = []
          details = []

          def add_error(message: str):
              errors.append(message)
              print(f"ERROR: {message}")

          def add_warning(message: str):
              warnings.append(message)
              print(f"WARNING: {message}")

          def read_toml(path: Path):
              if not path.exists():
                  add_error(f"Missing required manifest: {path.relative_to(root) if path.is_relative_to(root) else path}")
                  return {}
              try:
                  return tomllib.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  add_error(f"Could not parse {path}: {exc}")
                  return {}

          def section_body(text: str, section: str) -> str:
              match = re.search(rf"(?ms)^\[{re.escape(section)}\]\s*(.*?)(?=^\[|\Z)", text)
              return match.group(1) if match else ""

          def feature_key_order(path: Path) -> list[str]:
              if not path.exists():
                  return []
              body = section_body(path.read_text(encoding="utf-8"), "features")
              order = []
              seen = set()
              for line in body.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#") or "=" not in stripped:
                      continue
                  key = stripped.split("=", 1)[0].strip()
                  if key.startswith('"') and key.endswith('"'):
                      try:
                          key = json.loads(key)
                      except Exception:
                          key = key.strip('"')
                  if key and key not in seen:
                      order.append(key)
                      seen.add(key)
              return order

          def iter_dependency_tables(data):
              for section in ("dependencies", "dev-dependencies", "build-dependencies"):
                  table = data.get(section, {})
                  if isinstance(table, dict):
                      yield section, table

              target = data.get("target", {})
              if isinstance(target, dict):
                  for target_name, target_table in target.items():
                      if not isinstance(target_table, dict):
                          continue
                      for section in ("dependencies", "dev-dependencies", "build-dependencies"):
                          table = target_table.get(section, {})
                          if isinstance(table, dict):
                              yield f"target.{target_name}.{section}", table

          def dep_colon_refs(features: dict[str, list[str]]) -> set[str]:
              refs = set()
              for values in features.values():
                  if not isinstance(values, list):
                      continue
                  for value in values:
                      if isinstance(value, str) and value.startswith("dep:"):
                          refs.add(value[4:])
              return refs

          def package_features(path: Path) -> tuple[dict[str, list[str]], list[str]]:
              data = read_toml(path)
              explicit = data.get("features", {})
              if not isinstance(explicit, dict):
                  explicit = {}

              features = {name: list(values) for name, values in explicit.items() if isinstance(values, list)}
              order = feature_key_order(path)
              seen = set(order)
              hidden_optional_deps = dep_colon_refs(features)

              for _, table in iter_dependency_tables(data):
                  for dep_name, dep_value in table.items():
                      if isinstance(dep_value, dict) and dep_value.get("optional") is True:
                          if dep_name in hidden_optional_deps:
                              continue
                          if dep_name not in features:
                              features[dep_name] = []
                          if dep_name not in seen:
                              order.append(dep_name)
                              seen.add(dep_name)

              return features, order

          root_data = read_toml(root_manifest)
          gpui_features, gpui_order = package_features(gpui_manifest)
          facade_data = read_toml(facade_manifest)
          facade_features, facade_order = package_features(facade_manifest)

          workspace_deps = root_data.get("workspace", {}).get("dependencies", {})
          if not isinstance(workspace_deps, dict):
              workspace_deps = {}

          facade_dependency_entries = {}
          for section_name, table in iter_dependency_tables(facade_data):
              for dep_name, dep_value in table.items():
                  entry = facade_dependency_entries.setdefault(
                      dep_name,
                      {"values": [], "sections": [], "optional": False},
                  )
                  entry["values"].append(dep_value)
                  entry["sections"].append(section_name)
                  if isinstance(dep_value, dict) and dep_value.get("optional") is True:
                      entry["optional"] = True

          def dep_manifest(dep_name: str) -> Path | None:
              entry = facade_dependency_entries.get(dep_name)
              if not entry:
                  return None

              for dep_value in entry["values"]:
                  value = dep_value
                  base = facade_manifest.parent

                  if isinstance(value, dict) and value.get("workspace") is True:
                      workspace_value = workspace_deps.get(dep_name)
                      if not isinstance(workspace_value, dict):
                          continue
                      value = workspace_value
                      base = root

                  if isinstance(value, dict) and isinstance(value.get("path"), str):
                      candidate = (base / value["path"] / "Cargo.toml").resolve()
                      if candidate.exists():
                          return candidate

              return None

          dependency_feature_cache = {}
          def dependency_feature_set(dep_name: str) -> set[str] | None:
              if dep_name in dependency_feature_cache:
                  return dependency_feature_cache[dep_name]

              manifest = dep_manifest(dep_name)
              if manifest is None:
                  dependency_feature_cache[dep_name] = None
                  return None

              features, _ = package_features(manifest)
              feature_set = set(features)
              dependency_feature_cache[dep_name] = feature_set
              return feature_set

          # 1. gpui_facade must accept every feature that the underlying gpui
          # package accepts, including implicit features created by non-hidden
          # optional dependencies. This prevents downstream users from failing
          # when they replace package = "gpui" with package = "gpui_facade".
          missing_mirrors = []
          incomplete_mirrors = []

          for feature_name in gpui_order:
              if feature_name not in gpui_features:
                  continue

              mirror_ref = f"gpui/{feature_name}"
              if feature_name not in facade_features:
                  missing_mirrors.append(feature_name)
              elif mirror_ref not in facade_features[feature_name]:
                  incomplete_mirrors.append((feature_name, mirror_ref))

          if missing_mirrors:
              add_error(
                  "gpui_facade is missing feature mirror definitions for: "
                  + ", ".join(sorted(missing_mirrors))
              )

          if incomplete_mirrors:
              add_error(
                  "gpui_facade has feature names that exist in gpui but do not forward to gpui/<feature>: "
                  + ", ".join(f"{name} should include {ref}" for name, ref in sorted(incomplete_mirrors))
              )

          # 2. Every feature reference written in gpui_facade must be resolvable.
          # This catches target-only paths that a plain cargo check on Linux may
          # not exercise, such as macOS-only or Windows-only package features.
          bad_refs = []

          def is_known_local_feature(name: str) -> bool:
              return name in facade_features

          for feature_name in facade_order:
              values = facade_features.get(feature_name, [])
              if not isinstance(values, list):
                  bad_refs.append((feature_name, "<non-list>", "feature value is not an array"))
                  continue

              for value in values:
                  if not isinstance(value, str):
                      bad_refs.append((feature_name, repr(value), "feature item is not a string"))
                      continue

                  if value.startswith("dep:"):
                      dep_name = value[4:]
                      dep_entry = facade_dependency_entries.get(dep_name)
                      if dep_entry is None:
                          bad_refs.append((feature_name, value, "dep: reference points to a dependency that is not declared"))
                      elif dep_entry.get("optional") is not True:
                          bad_refs.append((feature_name, value, "dep: reference points to a non-optional dependency"))
                      continue

                  if "/" in value:
                      dep_part, dep_feature = value.split("/", 1)
                      weak = dep_part.endswith("?")
                      dep_name = dep_part[:-1] if weak else dep_part
                      dep_entry = facade_dependency_entries.get(dep_name)

                      if dep_entry is None:
                          bad_refs.append((feature_name, value, "dependency feature reference points to an undeclared dependency"))
                          continue

                      if weak and dep_entry.get("optional") is not True:
                          bad_refs.append((feature_name, value, "weak dependency feature reference uses ? on a non-optional dependency"))

                      known_dep_features = dependency_feature_set(dep_name)
                      if known_dep_features is not None and dep_feature != "default" and dep_feature not in known_dep_features:
                          manifest = dep_manifest(dep_name)
                          manifest_rel = manifest.relative_to(root) if manifest and manifest.is_relative_to(root) else manifest
                          bad_refs.append(
                              (
                                  feature_name,
                                  value,
                                  f"dependency feature is not defined in {manifest_rel}",
                              )
                          )
                      continue

                  if not is_known_local_feature(value):
                      bad_refs.append((feature_name, value, "local feature reference is not defined in gpui_facade"))

          if bad_refs:
              for feature_name, value, reason in bad_refs:
                  add_error(f"Invalid gpui_facade feature reference in {feature_name}: {value} ({reason})")

          details.append(f"Mirrored gpui features checked: {len(gpui_order)}")
          details.append(f"gpui_facade features checked: {len(facade_order)}")
          details.append(f"Declared gpui_facade dependency keys checked: {len(facade_dependency_entries)}")

          def md_escape(text: str) -> str:
              return text.replace("|", "\\|")

          def write_summary():
              if summary_path is None:
                  return

              lines = []
              lines.append("## gpui_facade feature validation")
              lines.append("")
              lines.append(f"- Result: {'failed' if errors else 'passed'}")
              for detail in details:
                  lines.append(f"- {detail}")
              lines.append("")

              if missing_mirrors:
                  lines.append("### Missing mirrored features")
                  lines.append("")
                  for name in sorted(missing_mirrors):
                      lines.append(f"- `{name}` should be added as `{name} = [\"gpui/{name}\"]`")
                  lines.append("")

              if incomplete_mirrors:
                  lines.append("### Incomplete mirrored features")
                  lines.append("")
                  for name, ref in sorted(incomplete_mirrors):
                      lines.append(f"- `{name}` should include `{ref}`")
                  lines.append("")

              if bad_refs:
                  lines.append("### Invalid feature references")
                  lines.append("")
                  lines.append("| facade feature | reference | problem |")
                  lines.append("| --- | --- | --- |")
                  for feature_name, value, reason in bad_refs:
                      lines.append(f"| `{md_escape(feature_name)}` | `{md_escape(str(value))}` | {md_escape(str(reason))} |")
                  lines.append("")

              if warnings:
                  lines.append("### Warnings")
                  lines.append("")
                  for warning in warnings:
                      lines.append(f"- {warning}")
                  lines.append("")

              summary_path.parent.mkdir(parents=True, exist_ok=True)
              with summary_path.open("a", encoding="utf-8") as f:
                  f.write("\n".join(lines).rstrip() + "\n\n")

          write_summary()

          if errors:
              raise SystemExit("gpui_facade feature validation failed; see GitHub workflow summary for details")

          print("gpui_facade feature validation passed")
          for detail in details:
              print(f"  - {detail}")
          PY
          }

          validate_cargo_metadata() {
            echo "Validating every workspace package before creating output branch"

            cd "$OUT_DIR"

            if [ ! -f Cargo.toml ]; then
              echo "Missing root Cargo.toml in output directory."
              exit 1
            fi

            if [ ! -f crates/gpui_facade/Cargo.toml ]; then
              echo "Missing generated crates/gpui_facade/Cargo.toml."
              exit 1
            fi

            cargo metadata \
              --no-deps \
              --format-version=1 \
              > "$RUNNER_TEMP/cargo-metadata.json"

            python3 - "$RUNNER_TEMP/cargo-metadata.json" "$RUNNER_TEMP/workspace-package-manifests.tsv" <<'PY'
          import json
          import sys
          from pathlib import Path

          metadata_path = Path(sys.argv[1])
          manifest_list_path = Path(sys.argv[2])

          with metadata_path.open("r", encoding="utf-8") as f:
              metadata = json.load(f)

          packages = metadata.get("packages", [])
          packages_by_id = {
              pkg.get("id"): pkg
              for pkg in packages
              if pkg.get("id")
          }
          workspace_member_ids = metadata.get("workspace_members", [])

          if not workspace_member_ids:
              raise SystemExit("cargo metadata succeeded, but workspace_members is empty")

          missing_ids = [
              package_id
              for package_id in workspace_member_ids
              if package_id not in packages_by_id
          ]
          if missing_ids:
              print("Workspace member IDs missing from metadata packages:")
              for package_id in missing_ids:
                  print(f"  - {package_id}")
              raise SystemExit("cargo metadata is internally inconsistent")

          workspace_packages = [packages_by_id[package_id] for package_id in workspace_member_ids]

          missing_manifests = []
          for pkg in workspace_packages:
              manifest_path = pkg.get("manifest_path")
              if not manifest_path or not Path(manifest_path).is_file():
                  missing_manifests.append((pkg.get("name", "<unnamed>"), manifest_path or "<missing>"))

          if missing_manifests:
              print("Workspace packages with missing Cargo.toml files:")
              for name, manifest_path in missing_manifests:
                  print(f"  - {name}: {manifest_path}")
              raise SystemExit("One or more workspace package manifests are missing")

          names = {pkg.get("name") for pkg in workspace_packages if pkg.get("name")}
          required_package_groups = {
              "gpui": {"gpui"},
              "gpui_platform": {"gpui_platform", "gpui-platform"},
              "gpui_facade": {"gpui_facade", "gpui-facade"},
          }

          missing_required = []
          for logical_name, candidates in required_package_groups.items():
              if not (names & candidates):
                  missing_required.append(f"{logical_name} ({', '.join(sorted(candidates))})")

          if missing_required:
              print("Workspace packages found:")
              for name in sorted(names):
                  print(f"  - {name}")
              raise SystemExit(
                  "Required GPUI workspace packages are missing: "
                  + "; ".join(missing_required)
              )

          print("Workspace packages discovered by cargo metadata:")
          rows = []
          for pkg in sorted(workspace_packages, key=lambda p: (p.get("manifest_path", ""), p.get("name", ""))):
              name = pkg.get("name", "<unnamed>")
              manifest_path = pkg.get("manifest_path", "")
              rows.append((name, manifest_path))
              print(f"  - {name}: {manifest_path}")

          manifest_list_path.write_text(
              "".join(f"{name}\t{manifest_path}\n" for name, manifest_path in rows),
              encoding="utf-8",
          )
          PY

            echo "Checking every workspace package with cargo check --workspace --all-targets"
            cargo check --workspace --all-targets

            if [ "${DEBUG_LOGS_INPUT}" = "true" ]; then
              echo "Per-package manifest validation list:"
              cat "$RUNNER_TEMP/workspace-package-manifests.tsv"
            fi

            echo "All workspace package metadata and cargo check validation passed"
          }

          CURRENT_STAGE="capture gpui package metadata"
          GPUI_METADATA_FILE="$(capture_gpui_package_metadata)"

          CURRENT_STAGE="prepare sparse output"
          copy_sparse_source_to_output

          CURRENT_STAGE="capture upstream file dates"
          UPSTREAM_DATE_SNAPSHOT="$(capture_upstream_file_dates_from_git)"
          if [ ! -f "$UPSTREAM_DATE_SNAPSHOT" ]; then
            echo "Date snapshot was not created correctly: $UPSTREAM_DATE_SNAPSHOT" >&2
            exit 1
          fi

          CURRENT_STAGE="remove materialized exclusions"
          remove_materialized_exclusions "$OUT_DIR"

          CURRENT_STAGE="rename root README files"
          rename_original_root_readmes

          CURRENT_STAGE="generate gpui_facade manifest"
          generate_gpui_facade_cargo_toml "$GPUI_METADATA_FILE"

          write_embedded_file \
            "crates/gpui_facade/README.md" \
            "FILE__CRATES_GPUI_FACADE_README_MD"

          write_embedded_file \
            "crates/gpui_facade/src/lib.rs" \
            "FILE__CRATES_GPUI_FACADE_SRC_LIB_RS"

          CURRENT_STAGE="amend root Cargo.toml workspace"
          amend_root_cargo_toml_for_workspace

          CURRENT_STAGE="validate gpui_facade features"
          validate_gpui_facade_features

          CURRENT_STAGE="generate FILES-BY-DATE-ZED.md"
          generate_files_by_date_markdown "$UPSTREAM_DATE_SNAPSHOT"

          if [ "${DEBUG_LOGS_INPUT}" = "true" ]; then
            echo "Final output tree root:"
            find "$OUT_DIR" -maxdepth 2 -mindepth 1 | sed "s#^$OUT_DIR/##" | sort | head -200
          fi

          CURRENT_STAGE="validate cargo metadata and check"
          validate_cargo_metadata

          CURRENT_STAGE="create and push generated branch"
          cd "$OUT_DIR"

          rm -rf .git
          git init
          git checkout -B "$OUTPUT_BRANCH"

          git add -A

          if [ "${DEBUG_LOGS_INPUT}" = "true" ]; then
            echo "Staged files summary:"
            git status --short
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 1
          fi

          git commit -m "${COMMIT_MESSAGE_INPUT}"

          git remote add origin "https://x-access-token:${PUSH_TOKEN}@github.com/${TARGET_REPOSITORY}.git"

          REMOTE_BRANCH_EXISTS=false

          if git ls-remote --exit-code --heads origin "$OUTPUT_BRANCH" >/dev/null 2>&1; then
            REMOTE_BRANCH_EXISTS=true
            git fetch --no-tags origin "$OUTPUT_BRANCH:refs/remotes/origin/$OUTPUT_BRANCH"
          fi

          if [ "$REMOTE_BRANCH_EXISTS" = "true" ]; then
            if git diff --quiet "origin/$OUTPUT_BRANCH" HEAD -- .; then
              echo "Remote branch '$OUTPUT_BRANCH' already has the same files."
              echo "Skipping push to avoid changing the branch commit unnecessarily."
              exit 0
            fi
          fi

          if [ "${FORCE_PUSH_INPUT}" = "true" ]; then
            git push --force-with-lease origin "HEAD:$OUTPUT_BRANCH"
          else
            git push origin "HEAD:$OUTPUT_BRANCH"
          fi

          {
            echo "## Generated branch"
            echo ""
            echo "- Source: \`${UPSTREAM_REPO}\`"
            echo "- Source branch: \`${UPSTREAM_BRANCH}\`"
            echo "- Output repo: \`${TARGET_REPOSITORY}\`"
            echo "- Output branch: \`${OUTPUT_BRANCH}\`"
            echo ""
            echo "Validation:"
            echo ""
            echo "\`\`\`text"
            echo "gpui_facade feature mirror/reference validation"
            echo "cargo metadata --no-deps --format-version=1"
            echo "cargo check --workspace --all-targets"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure summary
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## fork-gpui job failed"
            echo ""
            echo "- Upstream repo: \`${{ inputs.upstream_repo }}\`"
            echo "- Upstream branch/ref: \`${{ inputs.upstream_branch }}\`"
            echo "- Requested output branch: \`${{ inputs.output_branch }}\`"
            echo ""
            echo "Earlier summary sections may contain a more specific validation report. The most common gpui_facade-specific failures are:"
            echo ""
            echo "- Upstream \`gpui\` added a feature that \`gpui_facade\` did not mirror."
            echo "- \`gpui_facade\` references a dependency feature that is not defined in the referenced package."
            echo "- A target-specific optional dependency was renamed or removed upstream."
          } >> "$GITHUB_STEP_SUMMARY"
