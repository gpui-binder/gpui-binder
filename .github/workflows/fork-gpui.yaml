  FILE__CRATES_GPUI_FACADE_CARGO_TOML: |
    {{GPUI_PACKAGE_METADATA}}

    [lints]
    workspace = true

    [lib]
    path = "src/lib.rs"

    [features]
    default = ["font-kit", "wayland", "x11", "windows-manifest"]

    test-support = [
        "gpui/test-support",
        "gpui_platform/test-support",
        "gpui_macos?/test-support",
        "gpui_linux?/test-support",
        "gpui_windows?/test-support",
    ]

    bench = ["gpui/bench"]
    inspector = ["gpui/inspector", "gpui_macros/inspector"]
    leak-detection = ["gpui/leak-detection"]

    wayland = ["gpui/wayland", "gpui_platform/wayland", "gpui_linux?/wayland"]
    x11 = ["gpui/x11", "gpui_platform/x11", "gpui_linux?/x11"]

    screen-capture = [
        "gpui/screen-capture",
        "gpui_platform/screen-capture",
        "gpui_macos?/screen-capture",
        "gpui_linux?/screen-capture",
        "gpui_windows?/screen-capture",
    ]

    windows-manifest = ["gpui/windows-manifest"]
    input-latency-histogram = ["gpui/input-latency-histogram"]
    profiler = ["gpui/profiler"]

    font-kit = ["gpui_platform/font-kit", "gpui_macos?/font-kit"]
    runtime_shaders = ["gpui_platform/runtime_shaders", "gpui_macos?/runtime_shaders"]

    gpui_macros = ["dep:gpui_macros"]
    gpui_web = ["dep:gpui_web"]
    gpui_web_multithreaded = ["gpui_web", "gpui_web/multithreaded"]

    gpui_macos = ["dep:gpui_macos"]
    gpui_linux = ["dep:gpui_linux"]
    gpui_windows = ["dep:gpui_windows"]

    [dependencies]
    gpui.workspace = true
    gpui_platform.workspace = true
    gpui_macros = { workspace = true, optional = true }

    [target.'cfg(target_family = "wasm")'.dependencies]
    gpui_web = { workspace = true, optional = true }

    [target.'cfg(target_os = "macos")'.dependencies]
    gpui_macos = { workspace = true, optional = true }

    [target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
    gpui_linux = { workspace = true, optional = true }

    [target.'cfg(target_os = "windows")'.dependencies]
    gpui_windows = { workspace = true, optional = true }

  FILE__CRATES_GPUI_FACADE_README_MD: |
    # gpui_facade

    A facade crate that re-exports `gpui`, exposes `gpui_platform`, and can optionally expose related GPUI packages.

    ## Example

    ```toml
    gpui = { package = "gpui_facade", workspace = true }
    ```

    ```rust
    use gpui::*;

    let app = gpui::gpui_platform::application();
    ```

    ## Optional package re-exports

    ```toml
    gpui = { package = "gpui_facade", workspace = true, features = ["gpui_web"] }
    ```

    ```rust
    use gpui::*;

    #[cfg(target_family = "wasm")]
    let _ = gpui::gpui_web::WebPlatform::new(true);
    ```

  FILE__CRATES_GPUI_FACADE_SRC_LIB_RS: |
    #![doc = "Facade crate that re-exports GPUI plus optional GPUI-related crates."]

    pub use gpui::*;

    // No extra test re-export is needed here. When the facade feature
    // `test-support` is enabled, it enables `gpui/test-support`, and upstream
    // `gpui` itself publicly re-exports `test::*` from `gpui::*`.

    pub mod gpui_platform {
        pub use ::gpui_platform::*;
    }

    #[cfg(any(feature = "gpui_macros", feature = "inspector"))]
    pub mod gpui_macros {
        pub use ::gpui_macros::*;
    }

    #[cfg(any(feature = "gpui_macros", feature = "inspector"))]
    pub use ::gpui_macros::*;

    #[cfg(all(target_family = "wasm", feature = "gpui_web"))]
    pub mod gpui_web {
        pub use ::gpui_web::*;
    }

    #[cfg(all(target_family = "wasm", feature = "gpui_web"))]
    pub use ::gpui_web::*;

    #[cfg(all(target_os = "macos", feature = "gpui_macos"))]
    pub mod gpui_macos {
        pub use ::gpui_macos::*;
    }

    #[cfg(all(target_os = "macos", feature = "gpui_macos"))]
    pub use ::gpui_macos::*;

    #[cfg(all(any(target_os = "linux", target_os = "freebsd"), feature = "gpui_linux"))]
    pub mod gpui_linux {
        pub use ::gpui_linux::*;
    }

    #[cfg(all(any(target_os = "linux", target_os = "freebsd"), feature = "gpui_linux"))]
    pub use ::gpui_linux::*;

    #[cfg(all(target_os = "windows", feature = "gpui_windows"))]
    pub mod gpui_windows {
        pub use ::gpui_windows::*;
    }

    #[cfg(all(target_os = "windows", feature = "gpui_windows"))]
    pub use ::gpui_windows::*;

concurrency:
  group: fork-branch-apply-embedded-gpui-facade-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-branch:
    name: Generate modified branch
    runs-on: ubuntu-latest

    env:
      UPSTREAM_REPO_INPUT: ${{ inputs.upstream_repo }}
      UPSTREAM_BRANCH_INPUT: ${{ inputs.upstream_branch }}
      OUTPUT_BRANCH_INPUT: ${{ inputs.output_branch }}
      COMMIT_MESSAGE_INPUT: ${{ inputs.commit_message }}
      FORCE_PUSH_INPUT: ${{ inputs.force_push }}
      DEBUG_LOGS_INPUT: ${{ inputs.debug_logs }}
      CARGO_TARGET_DIR: /tmp/cargo-target
      RUN_NUMBER_VALUE: ${{ github.run_number }}
      TARGET_REPOSITORY: ${{ github.repository }}
      PUSH_TOKEN: ${{ github.token }}

    steps:
      - name: Install Linux cargo dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libgdk-pixbuf-2.0-dev \
            libatk1.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/cargo-target
          key: cargo-${{ runner.os }}-${{ inputs.upstream_repo }}-${{ inputs.upstream_branch }}-fork-gpui-perf-v1
          restore-keys: |
            cargo-${{ runner.os }}-${{ inputs.upstream_repo }}-${{ inputs.upstream_branch }}-
            cargo-${{ runner.os }}-${{ inputs.upstream_repo }}-
            cargo-${{ runner.os }}-

      - name: Sparse clone upstream, validate, and create generated branch
        shell: bash
        run: |
          set -Eeuo pipefail

          CURRENT_STAGE="initializing"

          append_failure_summary() {
            local status="${1:-unknown}"
            local line="${2:-unknown}"

            if [ -z "${GITHUB_STEP_SUMMARY:-}" ]; then
              return 0
            fi

            {
              echo "## fork-gpui failed"
              echo ""
              echo "- Stage: \`${CURRENT_STAGE:-unknown}\`"
              echo "- Exit status: \`${status}\`"
              echo "- Bash line: \`${line}\`"
              echo "- Upstream repo: \`${UPSTREAM_REPO_INPUT:-unknown}\`"
              echo "- Upstream branch/ref: \`${UPSTREAM_BRANCH_INPUT:-unknown}\`"
              echo ""
              echo "Check the failed step log above for command output. If the failure came from gpui_facade feature validation, the detailed feature report should appear above this section."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          }

          trap 'status=$?; line=$LINENO; if [ "$status" -ne 0 ]; then append_failure_summary "$status" "$line"; fi' ERR

          git config --global init.defaultBranch main
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          UPSTREAM_REPO="${UPSTREAM_REPO_INPUT}"
          UPSTREAM_BRANCH="${UPSTREAM_BRANCH_INPUT}"

          OUTPUT_BRANCH="${OUTPUT_BRANCH_INPUT}"
          if [ -z "$OUTPUT_BRANCH" ]; then
            SAFE_REPO="$(printf '%s' "$UPSTREAM_REPO" | tr '/:@ ' '----')"
            SAFE_BRANCH="$(printf '%s' "$UPSTREAM_BRANCH" | tr '/:@ ' '----')"
            OUTPUT_BRANCH="generated-${SAFE_REPO}-${SAFE_BRANCH}-${RUN_NUMBER_VALUE}"
          fi

          echo "Upstream repo: ${UPSTREAM_REPO}"
          echo "Upstream branch: ${UPSTREAM_BRANCH}"
          echo "Output branch: ${OUTPUT_BRANCH}"

          OUT_DIR="$RUNNER_TEMP/out"
          SOURCE_DIR="$OUT_DIR"

          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"

          cd "$OUT_DIR"

          git init
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"

          git config core.sparseCheckout true
          git config core.sparseCheckoutCone false

          SPARSE_FILE=".git/info/sparse-checkout"
          : > "$SPARSE_FILE"

          # Include everything recursively first.
          echo "/**" >> "$SPARSE_FILE"

          # Convert EXCLUDE_PATTERNS into sparse-checkout exclusion rules.
          printf '%s\n' "${EXCLUDE_PATTERNS}" | while IFS= read -r pattern; do
            pattern="${pattern%$'\r'}"

            case "$pattern" in
              "" ) continue ;;
              \#* ) continue ;;
            esac

            if [[ "$pattern" == \!* ]]; then
              echo "${pattern:1}" >> "$SPARSE_FILE"
            else
              echo "!$pattern" >> "$SPARSE_FILE"
            fi
          done

          # Force-include only files needed by the generator and metadata check.
          # Do not force-include /crates/** here; that defeats crate exclusions and
          # causes Git to materialize files that are deleted again later.
          {
            echo "/Cargo.toml"
            echo "/Cargo.lock"
            echo "/rust-toolchain.toml"
            echo "/rustfmt.toml"
            echo "/crates/gpui/"
            echo "/crates/gpui/**"
            echo "/crates/gpui/Cargo.toml"
            # gpui_wgpu benches include font files via include_bytes! when
            # cargo check --workspace --all-targets compiles bench targets.
            # Keep this narrow: re-include only fonts, not all assets/**.
            echo "/assets/fonts/"
            echo "/assets/fonts/**"
          } >> "$SPARSE_FILE"

          if [ "${DEBUG_LOGS_INPUT}" = "true" ]; then
            echo "Sparse checkout rules:"
            cat "$SPARSE_FILE"
          fi

          git fetch \
            --filter=blob:none \
            upstream \
            "$UPSTREAM_BRANCH"

          git checkout --detach FETCH_HEAD

          if [ "${DEBUG_LOGS_INPUT}" = "true" ]; then
            echo "Sparse source checkout root:"
            find . -maxdepth 2 -mindepth 1 -not -path './.git*' | sort | head -200
          fi

          capture_gpui_package_metadata() {
            local metadata_file="$RUNNER_TEMP/gpui-package-metadata.toml"

            python3 - "$metadata_file" <<'PY'
          from pathlib import Path
          import re
          import sys

          src = Path("crates/gpui/Cargo.toml")
          out_file = Path(sys.argv[1])

          if not src.exists():
              raise SystemExit("Missing required file: crates/gpui/Cargo.toml")

          text = src.read_text()

          match = re.search(r"(?ms)^\[package\]\n(.*?)(?=^\[)", text)
          if not match:
              raise SystemExit("Could not find [package] section in crates/gpui/Cargo.toml")

          package_body = match.group(1).rstrip() + "\n"

          overrides = {
              "name": '"gpui_facade"',
              "publish": "false",
          }

          for key, value in overrides.items():
              pattern = rf'(?m)^{re.escape(key)}\s*=.*$'
              line = f"{key} = {value}"

              if re.search(pattern, package_body):
                  package_body = re.sub(pattern, line, package_body)
              else:
                  package_body += line + "\n"

          metadata = "[package]\n" + package_body.rstrip() + "\n"
          out_file.write_text(metadata)
          PY

            echo "$metadata_file"
          }

          copy_sparse_source_to_output() {
            echo "Using sparse checkout directly as output directory"
          }

          capture_upstream_file_dates_from_git() {
            local snapshot_path="$RUNNER_TEMP/upstream-file-dates.tsv"

            echo "Capturing upstream file dates from Git commit history" >&2

            cd "$OUT_DIR"

            python3 - "$OUT_DIR" "$snapshot_path" <<'PY'
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo
          import subprocess
          import sys

          root = Path(sys.argv[1]).resolve()
          snapshot = Path(sys.argv[2]).resolve()
          denver = ZoneInfo("America/Denver")
          batch_size = 128

          def denver_date(iso: str) -> str:
              # Git %cI is strict ISO-8601, usually with an explicit numeric offset.
              return datetime.fromisoformat(iso.replace("Z", "+00:00")).astimezone(denver).date().isoformat()

          raw = subprocess.run(
              ["git", "-C", str(root), "ls-files", "-z"],
              check=True,
              stdout=subprocess.PIPE,
          ).stdout

          files = [item for item in raw.decode("utf-8", "surrogateescape").split("\0") if item]
          files = [rel for rel in files if (root / rel).is_file()]

          dates = {}

          for offset in range(0, len(files), batch_size):
              batch = files[offset:offset + batch_size]
              wanted = set(batch)
              current_date = None

              proc = subprocess.Popen(
                  [
                      "git",
                      "-C",
                      str(root),
                      "log",
                      "--format=@@%cI",
                      "--name-only",
                      "--",
                      *batch,
                  ],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
                  encoding="utf-8",
                  errors="surrogateescape",
              )

              assert proc.stdout is not None
              for line in proc.stdout:
                  line = line.rstrip("\n")

                  if line.startswith("@@"):
                      current_date = denver_date(line[2:])
                      continue

                  rel = line.strip()
                  if not rel or current_date is None:
                      continue

                  if rel in wanted and rel not in dates:
                      dates[rel] = current_date
                      wanted.remove(rel)

                      # Stop this batch as soon as every file has a latest commit date.
                      # This avoids walking old history unnecessarily.
                      if not wanted:
                          proc.terminate()
                          break

              try:
                  proc.wait(timeout=10)
              except subprocess.TimeoutExpired:
                  proc.kill()
                  proc.wait()

              if proc.returncode not in (0, -15, 143):
                  stderr = proc.stderr.read() if proc.stderr is not None else ""
                  raise SystemExit(f"git log failed while collecting file dates:\n{stderr}")

          # Fallback should be rare, but keeps generated output robust if a sparse-checkout
          # edge case leaves a file present but not tracked by Git.
          for rel in files:
              if rel not in dates:
                  dates[rel] = datetime.fromtimestamp((root / rel).stat().st_mtime, denver).date().isoformat()

          snapshot.write_text(
              "".join(f"{rel}\t{dates[rel]}\n" for rel in sorted(dates)),
              encoding="utf-8",
          )
          PY

            echo "$snapshot_path"
          }

          remove_materialized_exclusions() {
            local dir="$1"

            echo "Removing materialized exclusions from: $dir"

            cd "$dir"

            while IFS= read -r pattern; do
              pattern="${pattern%$'\r'}"

              case "$pattern" in
                "" ) continue ;;
                \#* ) continue ;;
                \!* ) continue ;;
              esac

              if [[ "$pattern" == */** ]]; then
                base="${pattern%/**}"
                rm -rf -- "$base"
              else
                rm -rf -- $pattern 2>/dev/null || true
              fi
            done <<< "${EXCLUDE_PATTERNS}"

            find . -depth -type d -empty -not -path './.git/*' -delete
          }

          generate_gpui_facade_cargo_toml() {
            local metadata_file="$1"
            local path="$OUT_DIR/crates/gpui_facade/Cargo.toml"

            echo "Generating: crates/gpui_facade/Cargo.toml"
            mkdir -p "$(dirname "$path")"

            python3 - "$metadata_file" "$path" <<'PY'
          from pathlib import Path
          import json
          import os
          import re
          import sys
          import tomllib

          metadata_file = Path(sys.argv[1])
          dst = Path(sys.argv[2])
          gpui_manifest = Path("crates/gpui/Cargo.toml")

          template = os.environ["FILE__CRATES_GPUI_FACADE_CARGO_TOML"]
          metadata = metadata_file.read_text().rstrip()

          output = template.replace("{{GPUI_PACKAGE_METADATA}}", metadata)

          missing = re.findall(r"\{\{[A-Z0-9_]+\}\}", output)
          if missing:
              raise SystemExit(
                  "Unresolved placeholders: " + ", ".join(sorted(set(missing)))
              )

          if not gpui_manifest.exists():
              raise SystemExit("Missing crates/gpui/Cargo.toml while generating gpui_facade")

          def read_toml(path: Path):
              return tomllib.loads(path.read_text(encoding="utf-8"))

          def section_body(text: str, section: str) -> tuple[int, int, str]:
              match = re.search(rf"(?ms)^\[{re.escape(section)}\]\s*(.*?)(?=^\[|\Z)", text)
              if not match:
                  raise SystemExit(f"Could not find [{section}] section")
              return match.start(1), match.end(1), match.group(1)

          def feature_key_order(text: str, section: str = "features") -> list[str]:
              try:
                  _, _, body = section_body(text, section)
              except SystemExit:
                  return []

              order = []
              seen = set()
              for line in body.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#") or "=" not in stripped:
                      continue

                  key = stripped.split("=", 1)[0].strip()
                  if key.startswith('"') and key.endswith('"'):
                      try:
                          key = json.loads(key)
                      except Exception:
                          key = key.strip('"')

                  if key and key not in seen:
                      order.append(key)
                      seen.add(key)
              return order

          def iter_dependency_tables(data):
              for section in ("dependencies", "dev-dependencies", "build-dependencies"):
                  table = data.get(section, {})
                  if isinstance(table, dict):
                      yield table

              target = data.get("target", {})
              if isinstance(target, dict):
                  for target_table in target.values():
                      if not isinstance(target_table, dict):
                          continue
                      for section in ("dependencies", "dev-dependencies", "build-dependencies"):
                          table = target_table.get(section, {})
                          if isinstance(table, dict):
                              yield table

          def explicit_dep_colon_refs(features: dict) -> set[str]:
              refs = set()
              for values in features.values():
                  if not isinstance(values, list):
                      continue
                  for value in values:
                      if isinstance(value, str) and value.startswith("dep:"):
                          refs.add(value[4:])
              return refs

          def package_feature_map(path: Path) -> tuple[dict[str, list[str]], list[str]]:
              text = path.read_text(encoding="utf-8")
              data = tomllib.loads(text)
              explicit = data.get("features", {})
              if not isinstance(explicit, dict):
                  explicit = {}

              features = {name: list(values) for name, values in explicit.items() if isinstance(values, list)}
              order = feature_key_order(text)
              seen = set(order)

              hidden_optional_deps = explicit_dep_colon_refs(features)
              for table in iter_dependency_tables(data):
                  for dep_name, dep_value in table.items():
                      if not isinstance(dep_value, dict) or dep_value.get("optional") is not True:
                          continue
                      if dep_name in hidden_optional_deps:
                          continue
                      if dep_name not in features:
                          features[dep_name] = []
                      if dep_name not in seen:
                          order.append(dep_name)
                          seen.add(dep_name)

              return features, order

          def unique(values: list[str]) -> list[str]:
              seen = set()
              result = []
              for value in values:
                  if value in seen:
                      continue
                  seen.add(value)
                  result.append(value)
              return result

          def toml_key(key: str) -> str:
              if re.fullmatch(r"[A-Za-z0-9_-]+", key):
                  return key
              return json.dumps(key)

          def format_feature_value(values: list[str]) -> str:
              values = unique(values)
              if not values:
                  return "[]"
              if len(values) == 1:
                  return "[" + json.dumps(values[0]) + "]"
              lines = ["["]
              for value in values:
                  lines.append(f"    {json.dumps(value)},")
              lines.append("]")
              return "\n".join(lines)

          def replace_features_section(text: str, features: dict[str, list[str]], order: list[str]) -> str:
              body_start, body_end, _ = section_body(text, "features")

              seen = set()
              final_order = []
              for key in order:
                  if key in features and key not in seen:
                      final_order.append(key)
                      seen.add(key)
              for key in features:
                  if key not in seen:
                      final_order.append(key)
                      seen.add(key)

              body = ""
              for key in final_order:
                  body += f"{toml_key(key)} = {format_feature_value(features[key])}\n"

              return text[:body_start] + body + text[body_end:]

          gpui_features, gpui_feature_order = package_feature_map(gpui_manifest)

          facade_data = tomllib.loads(output)
          facade_features = facade_data.get("features", {})
          if not isinstance(facade_features, dict):
              raise SystemExit("Generated gpui_facade Cargo.toml has no [features] table")
          facade_features = {
              name: list(values)
              for name, values in facade_features.items()
              if isinstance(values, list)
          }
          facade_order = feature_key_order(output)

          added_features = []
          amended_features = []

          for name in gpui_feature_order:
              if name not in gpui_features:
                  continue

              mirror_ref = f"gpui/{name}"

              if name not in facade_features:
                  facade_features[name] = [mirror_ref]
                  facade_order.append(name)
                  added_features.append(name)
                  continue

              if mirror_ref not in facade_features[name]:
                  facade_features[name] = [mirror_ref] + facade_features[name]
                  amended_features.append(name)

          output = replace_features_section(output, facade_features, facade_order)

          dst.write_text(output.rstrip() + "\n", encoding="utf-8")

          print("gpui_facade feature mirror generation completed")
          if added_features:
              print("Added missing gpui passthrough features:")
              for name in added_features:
                  print(f"  - {name}")
          if amended_features:
              print("Amended existing gpui_facade features to forward to gpui:")
              for name in amended_features:
                  print(f"  - {name}")
          PY
          }

          write_embedded_file() {
            local path="$1"
            local env_name="$2"
            local full_path="$OUT_DIR/$path"

