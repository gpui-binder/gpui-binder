name: Fork branch and apply embedded gpui facade fixes

on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "Repository to copy from"
        required: true
        default: "zed-industries/zed"
        type: string

      upstream_branch:
        description: "Branch to copy from upstream_repo"
        required: true
        default: "main"
        type: string

      output_branch:
        description: "Branch to create in this repository. Leave empty for auto-generated name."
        required: false
        default: ""
        type: string

      commit_message:
        description: "Commit message for embedded fixes"
        required: true
        default: "Add gpui facade crate"
        type: string

      force_push:
        description: "Force push output branch if it already exists"
        required: true
        default: false
        type: boolean

      debug_logs:
        description: "Print verbose debug logs"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

