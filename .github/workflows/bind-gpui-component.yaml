name: Import gpui-component

"on":
  workflow_dispatch:
    inputs:
      zed_ref:
        description: "Branch, tag, or SHA of this zed fork to use as the base"
        required: true
        default: "main"

      source_repo:
        description: "Repository to import from"
        required: true
        default: "longbridge/gpui-component"

      source_ref:
        description: "Branch, tag, or SHA from source repo to import"
        required: true
        default: "main"

      source_root_package:
        description: "Root package to import; packages named root-package-* are imported too"
        required: true
        default: "gpui-component"

      target_branch:
        description: "Branch to create/update with the generated import"
        required: true
        default: "generated"

permissions:
  contents: write

jobs:
  import:
    name: Import gpui-component into Zed workspace
    runs-on: ubuntu-latest

    env:
      TARGET_BRANCH: ${{ inputs.target_branch }}
      SOURCE_ROOT_PACKAGE: ${{ inputs.source_root_package }}
      CARGO_TARGET_DIR: /tmp/cargo-target

    steps:
      - name: Install Linux cargo dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libgdk-pixbuf-2.0-dev \
            libatk1.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/cargo-target
          key: cargo-${{ runner.os }}-${{ inputs.zed_ref }}-${{ inputs.source_repo }}-${{ inputs.source_ref }}-bind-gpui-component-v1
          restore-keys: |
            cargo-${{ runner.os }}-${{ inputs.zed_ref }}-${{ inputs.source_repo }}-
            cargo-${{ runner.os }}-${{ inputs.zed_ref }}-
            cargo-${{ runner.os }}-

      - name: Checkout zed fork
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.zed_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create target branch from selected zed ref
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B "${TARGET_BRANCH}"

      - name: Checkout gpui-component source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          path: _gpui_component_source
          fetch-depth: 1

      - name: Discover source package graph
        id: detect
        shell: python
        run: |
          from pathlib import Path
          import json
          import os
          import re
          import tomllib

          src = Path("_gpui_component_source").resolve()
          root_package = os.environ["SOURCE_ROOT_PACKAGE"].strip()

          def ignored(path: Path) -> bool:
              return any(part in {".git", "target"} for part in path.parts)

          def read_toml(path: Path):
              try:
                  return tomllib.loads(path.read_text())
              except Exception as exc:
                  print(f"Skipping unreadable TOML {path}: {exc}")
                  return None

          def package_target_path(package_name: str) -> str:
              safe = re.sub(r"[^A-Za-z0-9_]+", "_", package_name).strip("_")
              if not safe:
                  raise SystemExit(f"Cannot derive target path for package {package_name!r}")
              return f"crates/{safe}"

          def iter_dependency_items(data):
              for section in ("dependencies", "dev-dependencies", "build-dependencies"):
                  table = data.get(section, {})
                  if isinstance(table, dict):
                      yield from table.items()

              target = data.get("target", {})
              if isinstance(target, dict):
                  for target_table in target.values():
                      if not isinstance(target_table, dict):
                          continue
                      for section in ("dependencies", "dev-dependencies", "build-dependencies"):
                          table = target_table.get(section, {})
                          if isinstance(table, dict):
                              yield from table.items()

          def dep_package_name(dep_name: str, dep_value) -> str:
              if isinstance(dep_value, dict) and isinstance(dep_value.get("package"), str):
                  return dep_value["package"]
              return dep_name

          def dep_path(dep_value):
              if isinstance(dep_value, dict) and isinstance(dep_value.get("path"), str):
                  return dep_value["path"]
              return None

          source_root_manifest = src / "Cargo.toml"
          source_root_data = read_toml(source_root_manifest) or {}
          source_workspace_deps = source_root_data.get("workspace", {}).get("dependencies", {})
          if not isinstance(source_workspace_deps, dict):
              source_workspace_deps = {}

          packages = {}
          manifests_by_dir = {}
          for cargo_toml in src.rglob("Cargo.toml"):
              if ignored(cargo_toml.relative_to(src)):
                  continue

              data = read_toml(cargo_toml)
              if not data:
                  continue

              package = data.get("package", {})
              name = package.get("name") if isinstance(package, dict) else None
              if not name:
                  continue

              rel_manifest = cargo_toml.relative_to(src)
              if name in packages:
                  raise SystemExit(
                      f"Duplicate source package name {name!r}: "
                      f"{packages[name]['manifest']} and {rel_manifest}"
                  )

              packages[name] = {
                  "name": name,
                  "source": str(cargo_toml.parent.relative_to(src)),
                  "manifest": str(rel_manifest),
                  "target": package_target_path(name),
                  "data": data,
              }
              manifests_by_dir[cargo_toml.parent.resolve()] = name

          initial = sorted(
              name for name in packages
              if name == root_package or name.startswith(root_package + "-")
          )

          if not initial:
              print(f"Could not find package {root_package!r} or {root_package!r}-* in source repo.")
              print("Packages found:")
              for name in sorted(packages):
                  print(f"  {name}: {packages[name]['manifest']}")
              raise SystemExit(1)

          selected = set()
          queue = list(initial)

          while queue:
              name = queue.pop(0)
              if name in selected:
                  continue
              selected.add(name)

              item = packages[name]
              manifest_dir = src / item["source"]
              data = item["data"]

              for dep_name, dep_value in iter_dependency_items(data):
                  effective_value = dep_value
                  if isinstance(dep_value, dict) and dep_value.get("workspace") is True:
                      effective_value = source_workspace_deps.get(dep_name, dep_value)

                  local_dep_name = None
                  local_path = dep_path(effective_value)
                  if local_path:
                      candidate = (manifest_dir / local_path).resolve() / "Cargo.toml"
                      local_dep_name = manifests_by_dir.get(candidate.parent)

                  package_name = dep_package_name(dep_name, effective_value)
                  if not local_dep_name and package_name in packages:
                      # Some source manifests reference a sibling workspace package through
                      # a workspace dependency or package alias rather than direct path.
                      local_dep_name = package_name

                  if local_dep_name and local_dep_name not in selected and local_dep_name not in queue:
                      queue.append(local_dep_name)

          found = {
              name: {
                  "source": str((src / packages[name]["source"]).relative_to(Path.cwd())),
                  "target": packages[name]["target"],
                  "manifest": packages[name]["manifest"],
              }
              for name in sorted(selected)
          }

          imported_paths = sorted(item["target"] for item in found.values())

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a") as f:
              f.write(f"crates_json={json.dumps(found, sort_keys=True)}\n")
              f.write(f"imported_paths_json={json.dumps(imported_paths)}\n")

          print("Initial packages:", ", ".join(initial))
          print("Imported package graph:")
          print(json.dumps(found, indent=2, sort_keys=True))

      - name: Import discovered packages into zed/crates
        env:
          CRATES_JSON: ${{ steps.detect.outputs.crates_json }}
        shell: python
        run: |
          from pathlib import Path
          import json
          import os
          import shutil

          crates = json.loads(os.environ["CRATES_JSON"])

          Path("crates").mkdir(exist_ok=True)

          selected_source_dirs = {Path(item["source"]).resolve() for item in crates.values()}

          def make_ignore(source_root: Path):
              fixed_ignore = shutil.ignore_patterns(".git", "target", ".DS_Store")

              def ignore(current_dir, names):
                  ignored = set(fixed_ignore(current_dir, names))
                  current = Path(current_dir)
                  for name in names:
                      candidate = (current / name).resolve()
                      if candidate != source_root.resolve() and candidate in selected_source_dirs:
                          ignored.add(name)
                  return ignored

              return ignore

          for package, item in crates.items():
              source = Path(item["source"])
              target = Path(item["target"])

              if target.exists():
                  shutil.rmtree(target)

              shutil.copytree(source, target, ignore=make_ignore(source))

              print(f"Imported {package}: {source} -> {target}")

      - name: Patch root workspace Cargo.toml
        env:
          CRATES_JSON: ${{ steps.detect.outputs.crates_json }}
        shell: python
        run: |
          from pathlib import Path
          import json
          import os
          import re

          crates = json.loads(os.environ["CRATES_JSON"])

          root = Path("Cargo.toml")
          text = root.read_text()

          members_to_add = sorted(
              item["target"]
              for item in crates.values()
              if Path(item["target"]).exists()
          )

          if not re.search(r'(?m)^\[workspace\]\s*$', text):
              text += "\n[workspace]\n"

          members_match = re.search(r'(?ms)^members\s*=\s*\[(.*?)\]', text)

          if members_match:
              block = members_match.group(0)
              inner = members_match.group(1)
              existing_members = set(re.findall(r'"([^"]+)"', inner))

              additions = []
              for member in members_to_add:
                  if member not in existing_members:
                      additions.append(f'    "{member}",')

              if additions:
                  new_block = block[:-1].rstrip() + "\n" + "\n".join(additions) + "\n]"
                  text = text[:members_match.start()] + new_block + text[members_match.end():]
          else:
              workspace_match = re.search(r'(?m)^\[workspace\]\s*$', text)
              insert_at = workspace_match.end()

              member_lines = "\n\nmembers = [\n"
              for member in members_to_add:
                  member_lines += f'    "{member}",\n'
              member_lines += "]\n"

              text = text[:insert_at] + member_lines + text[insert_at:]

          if "[workspace.dependencies]" not in text:
              text += "\n[workspace.dependencies]\n"

          dep_section = re.search(
              r'(?ms)^\[workspace\.dependencies\]\s*(.*?)(?=^\[|\Z)',
              text,
          )

          deps_to_add = {
              package: f'{{ path = "{item["target"]}" }}'
              for package, item in sorted(crates.items())
              if Path(item["target"]).exists()
          }

          if dep_section:
              section = dep_section.group(0)
              additions = []

              for name, value in deps_to_add.items():
                  if not re.search(rf'(?m)^\s*{re.escape(name)}\s*=', section):
                      additions.append(f'{name} = {value}')

              if additions:
                  new_section = section.rstrip() + "\n" + "\n".join(additions) + "\n"
                  text = text[:dep_section.start()] + new_section + text[dep_section.end():]

          root.write_text(text)

      - name: Expand missing source workspace dependencies locally
        env:
          CRATES_JSON: ${{ steps.detect.outputs.crates_json }}
        shell: python
        run: |
          from pathlib import Path
          import json
          import os
          import re
          import tomllib

          crates = json.loads(os.environ["CRATES_JSON"])
          imported_packages = set(crates.keys())

          source_root = Path("_gpui_component_source/Cargo.toml")
          if not source_root.exists():
              raise SystemExit("Missing _gpui_component_source/Cargo.toml")

          source_text = source_root.read_text()
          root_text = Path("Cargo.toml").read_text()

          def extract_section(text: str, section_name: str) -> str:
              match = re.search(
                  rf'(?ms)^\[{re.escape(section_name)}\]\s*(.*?)(?=^\[|\Z)',
                  text,
              )
              return match.group(1) if match else ""

          def parse_dependency_entries(section: str):
              entries = {}
              current = []
              depth_curly = 0
              depth_square = 0

              for raw_line in section.splitlines():
                  line = raw_line.rstrip()

                  if not current:
                      stripped = line.strip()
                      if not stripped or stripped.startswith("#"):
                          continue
                      if not re.match(r'^[A-Za-z0-9_\-]+\s*=', stripped):
                          continue

                  current.append(line)

                  code = line.split("#", 1)[0]
                  depth_curly += code.count("{") - code.count("}")
                  depth_square += code.count("[") - code.count("]")

                  if depth_curly <= 0 and depth_square <= 0:
                      entry = "\n".join(current)
                      current = []
                      depth_curly = 0
                      depth_square = 0

                      match = re.match(r'^\s*([A-Za-z0-9_\-]+)\s*=', entry)
                      if match:
                          entries[match.group(1)] = entry

              return entries

          source_deps = parse_dependency_entries(extract_section(source_text, "workspace.dependencies"))
          target_workspace_deps = set(
              parse_dependency_entries(extract_section(root_text, "workspace.dependencies")).keys()
          )

          local_packages = {}
          for cargo_toml in Path("crates").glob("*/Cargo.toml"):
              try:
                  data = tomllib.loads(cargo_toml.read_text())
              except Exception:
                  continue
              name = data.get("package", {}).get("name")
              if name:
                  local_packages[name] = cargo_toml.parent

          def rewrite_zed_git_dependency_to_local_for_manifest(entry: str, manifest: Path) -> str:
              if "github.com/zed-industries/" not in entry:
                  return entry

              match = re.match(r'^\s*([A-Za-z0-9_\-]+)\s*=\s*\{(.*)\}\s*$', entry, re.S)
              if not match:
                  return entry

              dep_name = match.group(1)
              body = match.group(2)

              package_match = re.search(r'package\s*=\s*"([^"]+)"', body)
              package_name = package_match.group(1) if package_match else dep_name

              local_path = local_packages.get(package_name)
              if not local_path:
                  print(f"No local Zed package for {dep_name} / {package_name}; keeping source dependency.")
                  return entry

              relative_path = os.path.relpath(local_path, manifest.parent).replace(os.sep, "/")

              preserved = []
              if package_name != dep_name:
                  preserved.append(f'package = "{package_name}"')

              for key in ("features",):
                  m = re.search(rf'{key}\s*=\s*\[([^\]]*)\]', body, re.S)
                  if m:
                      preserved.append(f"{key} = [" + m.group(1).strip() + "]")

              for key in ("default-features", "optional"):
                  m = re.search(rf'{key}\s*=\s*(true|false)', body)
                  if m:
                      preserved.append(f"{key} = {m.group(1)}")

              parts = [f'path = "{relative_path}"'] + preserved
              rewritten = f'{dep_name} = {{ ' + ", ".join(parts) + " }"
              print(f"Rewrote {dep_name} for {manifest}: zed-industries git -> {relative_path}")
              return rewritten

          def replace_workspace_dep_line(text: str, dep_name: str, replacement: str) -> str:
              text = re.sub(
                  rf'(?m)^\s*{re.escape(dep_name)}\.workspace\s*=\s*true\s*$',
                  replacement,
                  text,
              )
              text = re.sub(
                  rf'(?m)^\s*{re.escape(dep_name)}\s*=\s*\{{[^\n]*workspace\s*=\s*true[^\n]*\}}\s*$',
                  replacement,
                  text,
              )
              return text

          for item in crates.values():
              target = Path(item["target"])
              for cargo_toml in target.rglob("Cargo.toml"):
                  text = cargo_toml.read_text()
                  original = text

                  for dep_name, source_entry in source_deps.items():
                      if dep_name in imported_packages or dep_name in target_workspace_deps:
                          continue
                      replacement = rewrite_zed_git_dependency_to_local_for_manifest(
                          source_entry,
                          cargo_toml,
                      )
                      text = replace_workspace_dep_line(text, dep_name, replacement)

                  if text != original:
                      cargo_toml.write_text(text)
                      print(f"Expanded source workspace dependencies in {cargo_toml}")

      - name: Remove nested workspace metadata from imported packages
        env:
          CRATES_JSON: ${{ steps.detect.outputs.crates_json }}
        shell: python
        run: |
          from pathlib import Path
          import json
          import os
          import re

          crates = json.loads(os.environ["CRATES_JSON"])

          for item in crates.values():
              target = Path(item["target"])
              for toml in target.rglob("Cargo.toml"):
                  text = toml.read_text()
                  original = text

                  text = re.sub(r'(?ms)^\[workspace\]\s*.*?(?=^\[|\Z)', '', text)
                  text = re.sub(r'(?ms)^\[workspace\.dependencies\]\s*.*?(?=^\[|\Z)', '', text)

                  if text != original:
                      toml.write_text(text)
                      print(f"Removed nested workspace metadata from {toml}")

      - name: Patch imported local package dependencies to workspace dependencies
        env:
          CRATES_JSON: ${{ steps.detect.outputs.crates_json }}
        shell: python
        run: |
          from pathlib import Path
          import json
          import os
          import re

          crates = json.loads(os.environ["CRATES_JSON"])
          imported_packages = set(crates.keys())
          imported_targets = {
              name: Path(item["target"])
              for name, item in crates.items()
          }

          def extract_inline_value(body: str, key: str):
              if key == "features":
                  match = re.search(r'features\s*=\s*\[([^\]]*)\]', body, re.S)
                  return "[" + match.group(1).strip() + "]" if match else None
              match = re.search(rf'{re.escape(key)}\s*=\s*("[^"]*"|true|false)', body)
              return match.group(1) if match else None

          def rewrite_inline_table(cargo_toml: Path, dep_name: str, body: str) -> str:
              package_value = extract_inline_value(body, "package")
              package_name = package_value.strip('"') if package_value else dep_name

              keep = []
              if package_value:
                  keep.append(f'package = {package_value}')

              features_value = extract_inline_value(body, "features")
              if features_value:
                  keep.append(f"features = {features_value}")

              default_features_value = extract_inline_value(body, "default-features")
              optional_value = extract_inline_value(body, "optional")

              # Cargo does not allow member crates to inherit a workspace dependency
              # and override default-features there. Preserve the original per-crate
              # behavior by keeping those dependencies as explicit local path deps.
              if default_features_value is not None:
                  target = imported_targets.get(package_name)
                  if target is None:
                      target = imported_targets.get(dep_name)
                  if target is None:
                      raise SystemExit(
                          f"Cannot resolve imported dependency target for {dep_name} / {package_name} in {cargo_toml}"
                      )
                  relative_path = os.path.relpath(target, cargo_toml.parent).replace(os.sep, "/")
                  parts = [f'path = "{relative_path}"'] + keep + [
                      f"default-features = {default_features_value}"
                  ]
                  if optional_value is not None:
                      parts.append(f"optional = {optional_value}")
                  return f'{dep_name} = {{ ' + ", ".join(parts) + " }"

              if optional_value is not None:
                  keep.append(f"optional = {optional_value}")

              parts = ["workspace = true"] + keep
              return f'{dep_name} = {{ ' + ", ".join(parts) + " }"

          def patch_dependency_to_workspace(cargo_toml: Path, crate_name: str):
              text = cargo_toml.read_text()
              original = text

              text = re.sub(
                  rf'(?m)^\s*{re.escape(crate_name)}\s*=\s*"[^"]+"\s*$',
                  f'{crate_name}.workspace = true',
                  text,
              )

              def repl(match):
                  return rewrite_inline_table(cargo_toml, crate_name, match.group(1))

              text = re.sub(
                  rf'(?ms)^\s*{re.escape(crate_name)}\s*=\s*\{{([^\n]*)\}}\s*$',
                  repl,
                  text,
              )

              if text != original:
                  cargo_toml.write_text(text)
                  print(f"Patched local dependency {crate_name} in {cargo_toml}")

          for item in crates.values():
              target = Path(item["target"])
              for cargo_toml in target.rglob("Cargo.toml"):
                  for package in imported_packages:
                      patch_dependency_to_workspace(cargo_toml, package)

      - name: Force imported packages to use local gpui_facade package
        env:
          CRATES_JSON: ${{ steps.detect.outputs.crates_json }}
        shell: python
        run: |
          from pathlib import Path
          import json
          import os
          import re

          crates = json.loads(os.environ["CRATES_JSON"])

          normal_replacement = 'gpui = { package = "gpui_facade", path = "../gpui_facade", features = ["gpui_macos", "gpui_web", "gpui_macros", "font-kit", "x11", "wayland", "runtime_shaders"] }'
          test_replacement = 'gpui = { package = "gpui_facade", path = "../gpui_facade", features = ["gpui_macos", "gpui_web", "gpui_macros", "font-kit", "x11", "wayland", "runtime_shaders", "test-support"] }'

          def section_bounds(text: str, section_name: str):
              # Important: do not use \s here because it can consume the newline
              # after the TOML section header and produce invalid output like
              # `[dev-dependencies]indoc = "2"`.
              header = re.search(rf'(?m)^\[{re.escape(section_name)}\][^\S\r\n]*$', text)
              if not header:
                  return None

              body_start = header.end()
              if body_start < len(text) and text[body_start] == "\n":
                  body_start += 1

              next_header = re.search(r'(?m)^\[', text[body_start:])
              section_end = body_start + next_header.start() if next_header else len(text)
              return header.start(), header.end(), body_start, section_end

          def remove_key_from_section(text: str, section_name: str, key: str) -> str:
              bounds = section_bounds(text, section_name)
              if not bounds:
                  return text

              _, _, body_start, section_end = bounds
              prefix = text[:body_start]
              section = text[body_start:section_end]
              suffix = text[section_end:]

              # Remove common one-line TOML dependency/feature forms.
              section = re.sub(rf'(?m)^\s*{re.escape(key)}\.workspace\s*=\s*true\s*(?:#.*)?\n?', '', section)
              section = re.sub(rf'(?m)^\s*{re.escape(key)}\s*=\s*"[^"]+"\s*(?:#.*)?\n?', '', section)
              section = re.sub(rf'(?m)^\s*{re.escape(key)}\s*=\s*\{{[^\n]*\}}\s*(?:#.*)?\n?', '', section)
              section = re.sub(rf'(?m)^\s*{re.escape(key)}\s*=\s*\[[^\n]*\]\s*(?:#.*)?\n?', '', section)
              return prefix + section + suffix

          def insert_or_replace_key(text: str, section_name: str, line: str) -> str:
              key = line.split("=", 1)[0].strip()
              text = remove_key_from_section(text, section_name, key)
              bounds = section_bounds(text, section_name)

              if not bounds:
                  suffix = "" if text.endswith("\n") else "\n"
                  return text + suffix + f"\n[{section_name}]\n{line}\n"

              _, header_end, body_start, _ = bounds
              return text[:header_end] + "\n" + line + "\n" + text[body_start:]

          def has_gpui_dependency(text: str) -> bool:
              return bool(re.search(r'(?m)^\s*gpui(?:\.workspace\s*=|\s*=)', text))

          def ensure_feature(text: str, feature_name: str, feature_value: str) -> str:
              return insert_or_replace_key(text, "features", f'{feature_name} = {feature_value}')

          def force_gpui(cargo_toml: Path):
              text = cargo_toml.read_text()
              original = text

              if not has_gpui_dependency(text):
                  return

              # Production dependency remains unchanged and does not enable
              # gpui_facade/test-support.
              text = insert_or_replace_key(text, "dependencies", normal_replacement)

              # Test-only opt-in for imported packages whose tests use #[gpui::test].
              # Cargo activates dev-dependencies only for tests/examples/benches, so
              # normal users are not affected by this feature.
              text = ensure_feature(text, "test-support", '["gpui/test-support"]')
              text = insert_or_replace_key(text, "dev-dependencies", test_replacement)

              if text != original:
                  cargo_toml.write_text(text)
                  print(f"Forced gpui dependency to local gpui_facade in {cargo_toml}")
                  print(f"Enabled test-only gpui_facade/test-support for {cargo_toml}")

          for item in crates.values():
              target = Path(item["target"])
              for cargo_toml in target.rglob("Cargo.toml"):
                  force_gpui(cargo_toml)

      - name: Apply gpui-unofficial-style modifications
        env:
          CRATES_JSON: ${{ steps.detect.outputs.crates_json }}
        shell: python
        run: |
          from pathlib import Path
          import json
          import os
          import re

          crates = json.loads(os.environ["CRATES_JSON"])

          imported_roots = [
              Path(item["target"])
              for item in crates.values()
              if Path(item["target"]).exists()
          ]

          text_extensions = {
              ".rs",
              ".toml",
              ".md",
              ".mdx",
              ".txt",
              ".ron",
              ".json",
              ".yml",
              ".yaml",
          }

          def is_text_file(path: Path) -> bool:
              return path.suffix in text_extensions

          for root in imported_roots:
              for path in root.rglob("*"):
                  if not path.is_file() or not is_text_file(path):
                      continue

                  try:
                      text = path.read_text()
                  except UnicodeDecodeError:
                      continue

                  original = text
                  text = text.replace("gpui_platform::", "gpui::gpui_platform::")
                  text = text.replace("gpui_web::", "gpui::gpui_web::")
                  text = text.replace("gpui_macros::", "gpui::gpui_macros::")

                  if text != original:
                      path.write_text(text)

          def remove_direct_split_crate_deps(cargo_toml: Path):
              text = cargo_toml.read_text()
              original = text

              for dep in ["gpui_platform", "gpui_web", "gpui_macros"]:
                  text = re.sub(rf'(?m)^\s*{re.escape(dep)}\.workspace\s*=\s*true\s*\n', '', text)
                  text = re.sub(rf'(?m)^\s*{re.escape(dep)}\s*=\s*\{{[^\n]*\}}\s*\n', '', text)
                  text = re.sub(rf'(?m)^\s*{re.escape(dep)}\s*=\s*"[^"]+"\s*\n', '', text)

              text = text.replace(
                  'inspector = ["gpui_macros/inspector", "gpui/inspector"]',
                  'inspector = ["gpui/inspector"]',
              )
              text = text.replace(
                  'inspector = ["gpui/inspector", "gpui_macros/inspector"]',
                  'inspector = ["gpui/inspector"]',
              )
              text = re.sub(
                  r"(?ms)^\[target\.'cfg\(target_family = \"wasm\"\)'\.dependencies\]\s*(?=^\[|\Z)",
                  "",
                  text,
              )

              if text != original:
                  cargo_toml.write_text(text)

          for root in imported_roots:
              for cargo_toml in root.rglob("Cargo.toml"):
                  remove_direct_split_crate_deps(cargo_toml)

      - name: Verify Linux native build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          pkg-config --modversion gdk-3.0
          pkg-config --modversion gdk-pixbuf-2.0
          pkg-config --modversion atk
          pkg-config --modversion pango
          pkg-config --modversion cairo

      - name: Validate generated branch
        env:
          CRATES_JSON: ${{ steps.detect.outputs.crates_json }}
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f Cargo.toml ]; then
            echo "Missing root Cargo.toml."
            exit 1
          fi

          if [ ! -f crates/gpui_facade/Cargo.toml ]; then
            echo "Missing crates/gpui_facade/Cargo.toml. Run fork-gpui first or use a zed_ref that already contains gpui_facade."
            exit 1
          fi

          cargo metadata \
            --no-deps \
            --format-version=1 \
            > "$RUNNER_TEMP/cargo-metadata.json"

          mapfile -t CHECK_PACKAGES < <(python - "$RUNNER_TEMP/cargo-metadata.json" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          metadata_path = Path(sys.argv[1])
          crates = json.loads(os.environ["CRATES_JSON"])
          metadata = json.loads(metadata_path.read_text())

          packages_by_id = {pkg.get("id"): pkg for pkg in metadata.get("packages", []) if pkg.get("id")}
          workspace_member_ids = metadata.get("workspace_members", [])
          workspace_packages = [packages_by_id[package_id] for package_id in workspace_member_ids if package_id in packages_by_id]

          if not workspace_member_ids:
              raise SystemExit("cargo metadata succeeded, but workspace_members is empty")

          workspace_names = {pkg.get("name") for pkg in workspace_packages if pkg.get("name")}
          workspace_manifest_paths = {str(Path(pkg.get("manifest_path", ""))) for pkg in workspace_packages}

          missing_metadata_ids = [package_id for package_id in workspace_member_ids if package_id not in packages_by_id]
          if missing_metadata_ids:
              print("Workspace member IDs missing from metadata packages:")
              for package_id in missing_metadata_ids:
                  print(f"  - {package_id}")
              raise SystemExit("cargo metadata is internally inconsistent")

          missing_imported = []
          for package, item in sorted(crates.items()):
              manifest = str((Path.cwd() / item["target"] / "Cargo.toml").resolve())
              if package not in workspace_names and manifest not in workspace_manifest_paths:
                  missing_imported.append(f"{package}: {item['target']}/Cargo.toml")

          required = {"gpui_facade", "gpui", "gpui_platform"}
          missing_required = sorted(name for name in required if name not in workspace_names)

          missing_manifest_files = []
          for pkg in workspace_packages:
              manifest = pkg.get("manifest_path")
              if not manifest or not Path(manifest).is_file():
                  missing_manifest_files.append((pkg.get("name", "<unnamed>"), manifest or "<missing>"))

          if missing_imported:
              print("Imported packages not found as workspace members:")
              for item in missing_imported:
                  print(f"  - {item}")
              raise SystemExit("Imported packages are missing from cargo metadata workspace members")

          if missing_required:
              print("Workspace package names found:")
              for name in sorted(workspace_names):
                  print(f"  - {name}")
              raise SystemExit("Required GPUI packages are missing: " + ", ".join(missing_required))

          if missing_manifest_files:
              print("Workspace packages with missing Cargo.toml files:")
              for name, manifest in missing_manifest_files:
                  print(f"  - {name}: {manifest}")
              raise SystemExit("One or more workspace package manifests are missing")

          check_packages = sorted(set(crates.keys()) | {"gpui_facade"})
          for package in check_packages:
              if package not in workspace_names:
                  raise SystemExit(f"Package selected for cargo check is not in workspace metadata: {package}")
              print(package)
          PY
          )

          CARGO_ARGS=()
          for package in "${CHECK_PACKAGES[@]}"; do
            CARGO_ARGS+=("-p" "$package")
          done

          echo "Checking imported package graph only:"
          printf '  - %s\n' "${CHECK_PACKAGES[@]}"
          cargo check "${CARGO_ARGS[@]}" --all-targets

          {
            echo "## Validation summary"
            echo
            echo "Validated generated branch with:"
            echo "- cargo metadata --no-deps --format-version=1"
            echo "- cargo check for imported packages plus gpui_facade only"
            echo
            echo "Checked packages:"
            printf -- "- %s\n" "${CHECK_PACKAGES[@]}"
            echo
            echo "Imported package paths:"
            python - <<'PY'
          import json
          import os
          crates = json.loads(os.environ["CRATES_JSON"])
          for package, item in sorted(crates.items()):
              print(f"- {package}: {item['target']}")
          PY
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Commit generated branch
        id: generated_commit
        env:
          IMPORTED_PATHS_JSON: ${{ steps.detect.outputs.imported_paths_json }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t IMPORTED_PATHS < <(python - <<'PY'
          import json
          import os
          for path in json.loads(os.environ["IMPORTED_PATHS_JSON"]):
              print(path)
          PY
          )

          git add Cargo.toml
          for path in "${IMPORTED_PATHS[@]}"; do
            git add "$path"
          done

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Import gpui-component into workspace"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push generated branch if files changed
        shell: bash
        run: |
          set -euo pipefail

          TARGET_BRANCH="${TARGET_BRANCH}"
          REMOTE_GENERATED_BRANCH="__remote_generated_tree_for_compare"

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            git fetch --no-tags origin "$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"

            git branch -f "$REMOTE_GENERATED_BRANCH" "refs/remotes/origin/$TARGET_BRANCH"

            if git rev-parse "$REMOTE_GENERATED_BRANCH^" >/dev/null 2>&1; then
              LAST_SUBJECT="$(git log -1 --format=%s "$REMOTE_GENERATED_BRANCH")"
              CHANGED_FILES="$(
                git diff-tree \
                  --no-commit-id \
                  --name-only \
                  -r "$REMOTE_GENERATED_BRANCH" \
                | sort \
                | tr '\n' ' '
              )"

              if [ "$LAST_SUBJECT" = "Add generated nightly README" ] && [ "$CHANGED_FILES" = "README.md " ]; then
                echo "Remote branch ends with README-only commit."
                git branch -f "$REMOTE_GENERATED_BRANCH" "$REMOTE_GENERATED_BRANCH^"
              fi
            fi

            echo "Comparing remote generated tree with new generated tree..."
            echo "Remote generated tree: $(git rev-parse "$REMOTE_GENERATED_BRANCH")"
            echo "New generated tree: $(git rev-parse HEAD)"

            if git diff --quiet "$REMOTE_GENERATED_BRANCH" HEAD -- .; then
              echo "Remote branch '$TARGET_BRANCH' already has the same generated files."
              echo "Skipping push to avoid changing the branch commit unnecessarily."
              exit 0
            fi

            echo "Generated files changed. Files differing from previous generated commit:"
            git diff --name-status "$REMOTE_GENERATED_BRANCH" HEAD -- . | head -200
          fi

          git push --force-with-lease origin "HEAD:$TARGET_BRANCH"
